version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Allow updates for action versions used in workflows

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # ESLint 10 breaks eslint-plugin-react v7.x compatibility
      # Waiting for eslint-plugin-react#3977 fix. See: https://github.com/jsx-eslint/eslint-plugin-react/issues/3977
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
